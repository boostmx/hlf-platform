name: Alerts scan

# Realtime trigger for wheel-tracker's alert engine.
# Vercel hobby cron can only run once per day; this workflow runs every 2 min
# during US market hours and curls the scan endpoint.
#
# Required repo secrets:
#   ALERTS_SCAN_URL    e.g. https://wheel.hlfinancialstrategies.com/api/alerts/scan
#   ALERTS_SCAN_SECRET shared bearer token (matches wheel-tracker env var)

on:
  schedule:
    # */2 14-21 UTC Mon-Fri = roughly 9:30am-4:30pm ET on weekdays.
    # NB: GitHub Actions cron is best-effort and can be delayed by a few minutes
    # during heavy load. Sufficient for wheel-strategy timeframes.
    - cron: "*/2 14-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: alerts-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit alerts/scan
        run: |
          if [ -z "${{ secrets.ALERTS_SCAN_URL }}" ] || [ -z "${{ secrets.ALERTS_SCAN_SECRET }}" ]; then
            echo "ALERTS_SCAN_URL or ALERTS_SCAN_SECRET not set; skipping" >&2
            exit 0
          fi
          curl --fail-with-body --max-time 60 \
            -X POST "${{ secrets.ALERTS_SCAN_URL }}" \
            -H "Authorization: Bearer ${{ secrets.ALERTS_SCAN_SECRET }}" \
            -H "Content-Type: application/json"
